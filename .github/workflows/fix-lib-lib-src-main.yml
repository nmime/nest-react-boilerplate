name: Fix lib/src glob cleanup

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  WORKFLOW_FILE: .github/workflows/fix-lib-lib-src-main.yml
  TRIGGER_FILE: .github/r106-lib-src-cleanup.trigger

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Normalize accidental doubled library source globs
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          repo = Path.cwd()
          suffixes = {'.ts','.tsx','.mts','.cts','.js','.jsx','.mjs','.cjs','.json','.jsonc','.md','.yml','.yaml','.css','.scss','.html','.txt'}
          skip = {'.git','node_modules','dist','coverage','.nx','.github'}
          changed=[]
          for path in sorted(repo.rglob('*')):
              if not path.is_file() or any(part in skip for part in path.parts):
                  continue
              if path.suffix not in suffixes:
                  continue
              try:
                  text = path.read_text()
              except UnicodeDecodeError:
                  continue
              updated = text
              while 'lib/lib/src' in updated or 'lib/lib/lib/src' in updated:
                  updated = updated.replace('lib/lib/lib/src', 'lib/src').replace('lib/lib/src', 'lib/src')
              if updated != text:
                  path.write_text(updated)
                  changed.append(path.as_posix())
          print('changed_files=')
          print('\n'.join(changed))
          PY

      - name: Validate library layout
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import json
          bad=[]
          for path in sorted(Path('.').rglob('*')):
              if not path.is_file() or any(part in {'.git','node_modules','dist','coverage','.nx','.github'} for part in path.parts):
                  continue
              try:
                  text = path.read_text()
              except UnicodeDecodeError:
                  continue
              if 'lib/lib/src' in text or 'lib/lib/lib/src' in text:
                  bad.append(f'doubled source glob in {path}')
          for project_file in sorted(Path('libs').glob('**/project.json')):
              data=json.loads(project_file.read_text())
              source_root=data.get('sourceRoot')
              if isinstance(source_root,str) and source_root.startswith('libs/'):
                  if not source_root.endswith('/lib/src'):
                      bad.append(f'{project_file}: sourceRoot={source_root}')
                  if not Path(source_root).is_dir():
                      bad.append(f'{project_file}: missing {source_root}')
          for root_src in sorted(Path('libs').glob('**/src')):
              if '/lib/src' not in root_src.as_posix():
                  bad.append(f'unmigrated root src dir: {root_src.as_posix()}')
          if bad:
              print('\n'.join(bad))
              raise SystemExit(1)
          PY

      - name: Remove one-time workflow and trigger
        run: |
          set -euo pipefail
          git rm -f "$WORKFLOW_FILE" "$TRIGGER_FILE"

      - name: Commit cleanup
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "fix: normalize lib src config globs"
          git push origin HEAD:main
