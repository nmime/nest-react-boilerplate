name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NX_DAEMON: "false"
  NODE_VERSION_FILE: .nvmrc
  PNPM_VERSION: 10.32.1

jobs:
  helm-validation:
    name: Helm render validation
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate GitHub workflow hardening
        run: node scripts/validate-github-workflows.mjs

      - name: Validate deployment, Docker, and Helm config
        run: pnpm run deploy:validate

  fast-check:
    name: Fast PR gate (ci:pr)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fast aggregate
        run: pnpm run ci:pr

      - name: Write fast gate summary
        if: always()
        run: |
          {
            echo "## Fast PR gate"
            echo
            echo "Command: \`pnpm run ci:pr\`"
            echo
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } | tee fast-check-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fast gate summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: fast-check-summary
          path: fast-check-summary.md
          if-no-files-found: ignore

  non-runtime-validation:
    name: Non-runtime validation gates
    runs-on: ubuntu-22.04
    needs: fast-check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migration freshness
        run: pnpm run db:migrations:check

      - name: Check library configuration standards
        run: pnpm run lib:configs:check

      - name: Check generated OpenAPI contracts
        run: pnpm run api:contracts:check

      - name: Check generated API clients
        run: pnpm run api:clients:check

      - name: Lint OpenAPI contracts
        run: pnpm run api:openapi:lint

      - name: Run consumer contract checks
        run: pnpm run api:contracts:consumer

      - name: Run bounded OpenAPI fuzz case generation
        run: pnpm run api:openapi:fuzz

      - name: Run property-based invariant checks
        run: pnpm run test:property

      - name: Write non-runtime validation summary
        if: always()
        run: |
          {
            echo "## Non-runtime validation gates"
            echo
            echo "Commands:"
            echo "- pnpm run db:migrations:check"
            echo "- pnpm run lib:configs:check"
            echo "- pnpm run api:contracts:check"
            echo "- pnpm run api:clients:check"
            echo "- pnpm run api:openapi:lint"
            echo "- pnpm run api:contracts:consumer"
            echo "- pnpm run api:openapi:fuzz"
            echo "- pnpm run test:property"
            echo
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } | tee non-runtime-validation-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload non-runtime validation summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: non-runtime-validation-summary
          path: non-runtime-validation-summary.md
          if-no-files-found: ignore

  quality:
    name: Nx quality gates
    runs-on: ubuntu-22.04
    needs:
      - fast-check
      - non-runtime-validation
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Changed-file format check
        run: pnpm run format:changed
      - name: Full format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test with configured coverage gates
        run: pnpm run test:coverage

      - name: Component tests with Testcontainers
        run: pnpm run test:component -- --coverage

      - name: Build
        run: pnpm run build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Storybook
        run: pnpm run storybook:build

      - name: Storybook interaction tests
        run: pnpm run test:storybook

      - name: Storybook visual regression
        run: pnpm run test:visual

      - name: Dependency audit
        run: pnpm run audit:ci

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-quality
          path: |
            coverage/**
          if-no-files-found: ignore

  e2e:
    name: Static/browser e2e coverage
    runs-on: ubuntu-22.04
    needs: quality
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E coverage
        run: pnpm run test:e2e:coverage

      - name: Upload e2e artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-artifacts
          path: |
            coverage/e2e/**
            playwright-report/**
            test-results/**
          if-no-files-found: ignore

  docker-smoke:
    name: Docker smoke stack
    runs-on: ubuntu-22.04
    needs: quality
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docker smoke
        run: pnpm run test:docker-smoke

  security-native:
    name: Native security gates
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scanning
        run: pnpm run test:security:secrets

      - name: Static application security testing
        run: pnpm run test:security:sast

      - name: Upload native security artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: native-security-results
          path: |
            test-results/security-secrets/**
            test-results/security-sast/**
          if-no-files-found: ignore

  ops-gates:
    name: Runtime QA/ops gates
    runs-on: ubuntu-22.04
    needs: docker-smoke
    timeout-minutes: 90
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/nest_react_boilerplate
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8082
      PLAYWRIGHT_AUTO_INSTALL: "1"
      A11Y_URLS: http://127.0.0.1:8081,http://127.0.0.1:8082,http://127.0.0.1:8083
      PERF_URLS: http://127.0.0.1:8082,http://127.0.0.1:8083
      PERF_API_URLS: http://127.0.0.1:3001/health,http://127.0.0.1:3002/health,http://127.0.0.1:3003/health
      SECURITY_DAST_URLS: http://127.0.0.1:8081,http://127.0.0.1:8082,http://127.0.0.1:8083
      QA_LOAD_URLS: http://127.0.0.1:3001/health,http://127.0.0.1:3002/health,http://127.0.0.1:3003/health
      QA_CANARY_URLS: http://127.0.0.1:8081,http://127.0.0.1:8082,http://127.0.0.1:8083,http://127.0.0.1:3001/health,http://127.0.0.1:3002/health,http://127.0.0.1:3003/health
      QA_CHAOS_URLS: http://127.0.0.1:3002/health
      QA_CHAOS_SERVICE: user-app-api
      QA_MIGRATION_ROLLBACK_COMMAND: pnpm run db:migrations:rollback-check
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser matrix
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Start local runtime stack
        run: docker compose -f docker/docker-compose.yml up -d --build

      - name: Run runtime-backed QA/ops gates
        run: pnpm run test:world-class

      - name: Stop local runtime stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down --remove-orphans --volumes

      - name: Upload ops gate artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ops-gate-artifacts
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore

  fullstack-e2e:
    name: Fullstack Playwright e2e
    runs-on: ubuntu-22.04
    needs: docker-smoke
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Fullstack e2e
        run: pnpm run test:fullstack

      - name: Upload fullstack artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: fullstack-e2e-artifacts
          path: |
            coverage/e2e/fullstack/**
            playwright-report/fullstack/**
            test-results/fullstack/**
          if-no-files-found: ignore

  ci-status-summary:
    name: CI status summary
    runs-on: ubuntu-22.04
    needs:
      - helm-validation
      - fast-check
      - non-runtime-validation
      - quality
      - e2e
      - docker-smoke
      - security-native
      - ops-gates
      - fullstack-e2e
    if: always()
    timeout-minutes: 5
    steps:
      - name: Write CI status summary
        run: |
          {
            echo "## CI status summary"
            echo
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Helm render validation | ${{ needs.helm-validation.result }} |"
            echo "| Fast PR gate (ci:pr) | ${{ needs.fast-check.result }} |"
            echo "| Non-runtime validation gates | ${{ needs.non-runtime-validation.result }} |"
            echo "| Nx quality gates | ${{ needs.quality.result }} |"
            echo "| Static/browser e2e coverage | ${{ needs.e2e.result }} |"
            echo "| Docker smoke stack | ${{ needs.docker-smoke.result }} |"
            echo "| Native security gates | ${{ needs.security-native.result }} |"
            echo "| Runtime QA/ops gates | ${{ needs.ops-gates.result }} |"
            echo "| Fullstack Playwright e2e | ${{ needs.fullstack-e2e.result }} |"
          } | tee ci-status-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI status summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ci-status-summary
          path: ci-status-summary.md
          if-no-files-found: error
