server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # Keep this split-origin SPA policy aligned with documented VITE API origins.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://auth.example.com https://api.example.com https://admin-api.example.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  location = /index.html {
    add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
    add_header Expires "Sat, 01 Jan 2000 00:00:00 GMT" always;
    add_header Pragma "no-cache" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js|jpg|jpeg|gif|png|svg|ico|ttf|woff|woff2|eot)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }
}
