name: PR 43 stabilization

on:
  push:
    branches:
      - copilot/cleanup-testing-tooling
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stabilize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: copilot/cleanup-testing-tooling
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - name: Stabilize contracts and formatting
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main

          mkdir -p contracts/openapi
          git show origin/main:docs/openapi/admin-app-api.json > contracts/openapi/admin-app-api.json
          git show origin/main:docs/openapi/auth-app-api.json > contracts/openapi/auth-app-api.json
          git show origin/main:docs/openapi/user-app-api.json > contracts/openapi/user-app-api.json

          mapfile -t files < <(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- \
            '*.js' '*.mjs' '*.mts' '*.ts' '*.json' '*.yaml' '*.yml' '*.md' \
            ':(exclude)contracts/openapi/admin-app-api.json' \
            ':(exclude)contracts/openapi/auth-app-api.json' \
            ':(exclude)contracts/openapi/user-app-api.json' \
            | while read -r f; do [ -f "$f" ] && printf '%s\n' "$f"; done)
          if [ "${#files[@]}" -gt 0 ]; then
            npx --yes prettier@3.8.3 --write "${files[@]}"
          fi

          # Keep relocated generated contracts byte-for-byte identical to main docs/openapi.
          cmp <(git show origin/main:docs/openapi/admin-app-api.json) contracts/openapi/admin-app-api.json
          cmp <(git show origin/main:docs/openapi/auth-app-api.json) contracts/openapi/auth-app-api.json
          cmp <(git show origin/main:docs/openapi/user-app-api.json) contracts/openapi/user-app-api.json

          fail=0
          while IFS= read -r f; do
            node --check "$f" || fail=1
          done < <(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.mjs' | while read -r f; do [ -f "$f" ] && printf '%s\n' "$f"; done)
          [ "$fail" -eq 0 ]

          node packages/tooling/scripts/qa/openapi-lint.mjs
          node packages/tooling/scripts/qa/property.mjs

      - name: Commit stabilization result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --quiet .github/workflows/pr43-stabilize.yml
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: stabilize PR 43 formatting and contracts"
            git push origin HEAD:copilot/cleanup-testing-tooling
          fi
