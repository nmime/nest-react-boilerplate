name: CI

on:
  push:
    branches:
      - test/ui-hardening-r60
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-pnpm-lock:
    name: Regenerate pnpm lockfile
    if: github.ref == 'refs/heads/test/ui-hardening-r60'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Regenerate pnpm-lock.yaml
        run: pnpm --config.engine-strict=false install --lockfile-only --frozen-lockfile=false

      - name: Verify Storybook lockfile entries
        run: |
          grep -Fq "'@storybook/react-vite':" pnpm-lock.yaml
          grep -Fq "'@storybook/test-runner':" pnpm-lock.yaml
          grep -Fq "storybook:" pnpm-lock.yaml

      - name: Commit pnpm-lock.yaml through GitHub REST Contents API
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';

          const token = process.env.GITHUB_TOKEN;
          const repo = process.env.GITHUB_REPOSITORY;
          const branch = process.env.GITHUB_REF_NAME;
          const filePath = 'pnpm-lock.yaml';

          if (!token || !repo || !branch) {
            throw new Error('Missing GitHub Actions repository context');
          }

          const content = await readFile(filePath, 'utf8');
          for (const required of ["'@storybook/react-vite':", "'@storybook/test-runner':", 'storybook:']) {
            if (!content.includes(required)) {
              throw new Error(`Regenerated lockfile is missing ${required}`);
            }
          }

          const apiUrl = `https://api.github.com/repos/${repo}/contents/${filePath}`;
          const headers = {
            accept: 'application/vnd.github+json',
            authorization: `Bearer ${token}`,
            'user-agent': 'ui-hardening-lockfile-bootstrap',
            'x-github-api-version': '2022-11-28',
          };

          const getResponse = await fetch(`${apiUrl}?ref=${encodeURIComponent(branch)}`, {
            headers,
          });

          if (!getResponse.ok) {
            throw new Error(`Failed to read existing ${filePath}: ${getResponse.status} ${await getResponse.text()}`);
          }

          const current = await getResponse.json();
          const remoteContent = Buffer.from(String(current.content ?? '').replaceAll('\n', ''), 'base64').toString('utf8');

          if (remoteContent === content) {
            console.log(`${filePath} already up to date`);
            process.exit(0);
          }

          const putResponse = await fetch(apiUrl, {
            method: 'PUT',
            headers: {
              ...headers,
              'content-type': 'application/json',
            },
            body: JSON.stringify({
              branch,
              content: Buffer.from(content, 'utf8').toString('base64'),
              message: 'chore: regenerate UI hardening lockfile',
              sha: current.sha,
            }),
          });

          if (!putResponse.ok) {
            throw new Error(`Failed to update ${filePath}: ${putResponse.status} ${await putResponse.text()}`);
          }

          const result = await putResponse.json();
          console.log(JSON.stringify({ commit: result.commit?.sha, blob: result.content?.sha }, null, 2));
          NODE
