x-backend-env: &backend-env
  NODE_ENV: production
  PORT: 3000
  HOST: ${HOST:-0.0.0.0}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:${ADMIN_APP_PORT:-8081},http://localhost:${USER_APP_PORT:-8082},http://localhost:${LANDING_APP_PORT:-8083}}
  DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/nest_react_boilerplate}
  AUTH_PERSISTENCE: postgres
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-replace-with-a-local-dev-secret}
  AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-nest-react-boilerplate}
  AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-nest-react-boilerplate-api}
  AUTH_JWT_EXPIRES_IN_SECONDS: ${AUTH_JWT_EXPIRES_IN_SECONDS:-3600}
  ADMIN_BOOTSTRAP_EMAILS: ${ADMIN_BOOTSTRAP_EMAILS:-}
  OPENAPI_ENABLED: ${OPENAPI_ENABLED:-true}
  OPENAPI_PATH: ${OPENAPI_PATH:-docs}

x-backend-healthcheck: &backend-healthcheck
  test:
    [
      "CMD-SHELL",
      'node -e "fetch(''http://127.0.0.1:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
    ]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 20s

x-frontend-healthcheck: &frontend-healthcheck
  test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/nginx-health | grep -q ok"]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 10s

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nest_react_boilerplate}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-nest_react_boilerplate}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: ..
      network: ${DOCKER_BUILD_NETWORK:-default}
      dockerfile: Dockerfile
      target: migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment: *backend-env
    command: ["pnpm", "db:migrate"]

  backend-admin-app-api:
    build:
      context: ..
      network: ${DOCKER_BUILD_NETWORK:-default}
      dockerfile: Dockerfile
      target: backend
      args:
        NX_PROJECT: backend-admin-app-api
        BUILD_OUTPUT: dist/apps/backend/admin-app-api
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_ADMIN_APP_API_PORT:-3001}:3000"
    healthcheck: *backend-healthcheck

  user-app-api:
    build:
      context: ..
      network: ${DOCKER_BUILD_NETWORK:-default}
      dockerfile: Dockerfile
      target: backend
      args:
        NX_PROJECT: user-app-api
        BUILD_OUTPUT: dist/apps/backend/user-app-api
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${USER_APP_API_PORT:-3002}:3000"
    healthcheck: *backend-healthcheck

  auth-app-api:
    build:
      context: ..
      network: ${DOCKER_BUILD_NETWORK:-default}
      dockerfile: Dockerfile
      target: backend
      args:
        NX_PROJECT: auth-app-api
        BUILD_OUTPUT: dist/apps/backend/auth-app-api
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${AUTH_APP_API_PORT:-3003}:3000"
    healthcheck: *backend-healthcheck

  admin-app:
    build:
      context: ..
      network: ${DOCKER_BUILD_NETWORK:-default}
      dockerfile: Dockerfile
      target: frontend
      args:
        NX_PROJECT: admin-app
        FRONTEND_OUTPUT: dist/apps/frontend/admin
    restart: unless-stopped
    depends_on:
      backend-admin-app-api:
        condition: service_healthy
    ports:
      - "${ADMIN_APP_PORT:-8081}:8080"
    healthcheck: *frontend-healthcheck

  user-app:
    build:
      context: ..
      network: ${DOCKER_BUILD_NETWORK:-default}
      dockerfile: Dockerfile
      target: frontend
      args:
        NX_PROJECT: user-app
        FRONTEND_OUTPUT: dist/apps/frontend/app
    restart: unless-stopped
    depends_on:
      auth-app-api:
        condition: service_healthy
      user-app-api:
        condition: service_healthy
    ports:
      - "${USER_APP_PORT:-8082}:8080"
    healthcheck: *frontend-healthcheck

  landing-app:
    build:
      context: ..
      network: ${DOCKER_BUILD_NETWORK:-default}
      dockerfile: Dockerfile
      target: frontend
      args:
        NX_PROJECT: landing-app
        FRONTEND_OUTPUT: dist/apps/frontend/landing
    restart: unless-stopped
    depends_on:
      auth-app-api:
        condition: service_healthy
      user-app-api:
        condition: service_healthy
      backend-admin-app-api:
        condition: service_healthy
    ports:
      - "${LANDING_APP_PORT:-8083}:8080"
    healthcheck: *frontend-healthcheck

volumes:
  postgres-data:
