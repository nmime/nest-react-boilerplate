packages:
  - "apps/frontend/*"
  - "apps/backend/*"
  - "libs/frontend/*/lib"
  - "libs/frontend/feature/*/*/lib"
  - "libs/common/*/lib"
  - "libs/backend/common/*/lib"
  - "libs/backend/feature/*/*/lib"
  - "libs/backend/postgres/*/*/lib"
  - "packages/tooling"

overrides:
  "typescript": "6.0.3"
  "rxjs": "7.8.2"
  "tslib": "2.8.1"
  "lodash": "4.18.1"
  "brace-expansion@<2.0.0": "1.1.14"
  "brace-expansion@>=2.0.0 <3.0.0": "2.1.0"
  "picomatch@<3.0.0": "2.3.2"
  "picomatch@>=4.0.0 <5.0.0": "4.0.4"
  "path-to-regexp@>=8.0.0 <9.0.0": "8.4.2"
  "serialize-javascript": "7.0.5"
  "postcss": "8.5.15"
  "follow-redirects": "1.16.0"
  "axios": "1.16.1"
  "fast-uri": "3.1.2"
  "svgo@>=3.0.0 <4.0.0": "3.3.3"
  "js-yaml": "4.1.1"
  "brace-expansion@>=4.0.0 <6.0.0": "5.0.6"
  "yaml": "2.9.0"
  "ajv@>=7.0.0 <9.0.0": "8.20.0"
  "ws": "8.21.0"
  "tmp@<0.2.6": "0.2.6"
  "uuid@<11.1.1": "11.1.1"
  "qs@>=6.11.1 <=6.15.1": "6.15.2"

onlyBuiltDependencies:
  - "@nestjs/core"
  - "@parcel/watcher"
  - "@swc/core"
  - esbuild
  - nx

ignoredBuiltDependencies:
  - "@scarf/scarf"
  - less
  - unrs-resolver

minimumReleaseAgeExclude:
  - "@storybook/builder-vite@10.4.3"
  - "@storybook/csf-plugin@10.4.3"
  - "@storybook/react-dom-shim@10.4.3"
  - "@storybook/react-vite@10.4.3"
  - "@storybook/react@10.4.3"
  - "@swc/core-darwin-arm64@1.15.41"
  - "@swc/core-darwin-x64@1.15.41"
  - "@swc/core-linux-arm-gnueabihf@1.15.41"
  - "@swc/core-linux-arm64-gnu@1.15.41"
  - "@swc/core-linux-arm64-musl@1.15.41"
  - "@swc/core-linux-ppc64-gnu@1.15.41"
  - "@swc/core-linux-s390x-gnu@1.15.41"
  - "@swc/core-linux-x64-gnu@1.15.41"
  - "@swc/core-linux-x64-musl@1.15.41"
  - "@swc/core-win32-arm64-msvc@1.15.41"
  - "@swc/core-win32-ia32-msvc@1.15.41"
  - "@swc/core-win32-x64-msvc@1.15.41"
  - "@swc/core@1.15.41"
  - "prettier@3.8.4"
  - "storybook@10.4.3"
  - "@storybook/addon-vitest@10.4.3"

allowBuilds:
  "@nestjs/core": true
  "@parcel/watcher": true
  "@scarf/scarf": false
  "@swc/core": true
  cpu-features: false
  esbuild: true
  less: false
  nx: true
  protobufjs: false
  ssh2: false
  unrs-resolver: false
