name: Delete stale refactor branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/delete-stale-refactor-branch.yml
  workflow_dispatch:

permissions:
  contents: write

env:
  STALE_BRANCH: refactor/frontend-src-lib-feature-layout
  WORKFLOW_FILE: .github/workflows/delete-stale-refactor-branch.yml

jobs:
  delete-stale-refactor-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale refactor branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${REPOSITORY}/git/refs/heads/${STALE_BRANCH}"
          status="$({ curl -sS -o /tmp/delete-ref-response.json -w "%{http_code}" \
            -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" || true; })"
          if [ "$status" = "204" ]; then
            echo "Deleted ${STALE_BRANCH}"
          elif [ "$status" = "404" ]; then
            echo "${STALE_BRANCH} is already absent"
          else
            echo "Failed to delete ${STALE_BRANCH}; HTTP ${status}"
            cat /tmp/delete-ref-response.json
            exit 1
          fi

      - name: Remove one-time workflow
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Commit workflow removal
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm "$WORKFLOW_FILE"
          git commit -m "chore: remove one-time stale branch cleanup workflow" || exit 0
          git push
