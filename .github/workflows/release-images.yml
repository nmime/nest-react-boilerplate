name: Release images

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  PNPM_VERSION: 11.6.0
  HELM_VERSION: v3.15.4

jobs:
  helm-render:
    name: Helm render gate
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate deployment config
        run: node scripts/validate-deployment-config.mjs
      - name: Validate Helm rate-limit config
        run: node scripts/validate-helm-rate-limit-config.mjs
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Validate Helm chart
        run: bash scripts/validate-helm.sh

  build-scan-sign:
    name: Build, scan, and sign ${{ matrix.name }}
    runs-on: ubuntu-22.04
    needs: helm-render
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: migrator
            target: migrator
            build-args: |
              PNPM_VERSION=11.6.0
          - name: admin-app-api
            target: backend
            build-args: |
              NX_PROJECT=admin-app-api
              BUILD_OUTPUT=dist/apps/backend/admin-app-api
              PNPM_VERSION=11.6.0
          - name: user-app-api
            target: backend
            build-args: |
              NX_PROJECT=user-app-api
              BUILD_OUTPUT=dist/apps/backend/user-app-api
              PNPM_VERSION=11.6.0
          - name: auth-app-api
            target: backend
            build-args: |
              NX_PROJECT=auth-app-api
              BUILD_OUTPUT=dist/apps/backend/auth-app-api
              PNPM_VERSION=11.6.0
          - name: admin-app
            target: frontend
            build-args: |
              NX_PROJECT=admin-app
              FRONTEND_OUTPUT=dist/apps/frontend/admin
              VITE_API_BASE_URL_MODE=same-origin
              PNPM_VERSION=11.6.0
          - name: user-app
            target: frontend
            build-args: |
              NX_PROJECT=user-app
              FRONTEND_OUTPUT=dist/apps/frontend/app
              VITE_API_BASE_URL_MODE=same-origin
              PNPM_VERSION=11.6.0
          - name: landing-app
            target: frontend
            build-args: |
              NX_PROJECT=landing-app
              FRONTEND_OUTPUT=dist/apps/frontend/landing
              VITE_API_BASE_URL_MODE=same-origin
              PNPM_VERSION=11.6.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          provenance: mode=max
          sbom: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Generate SBOM artifact
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json
          if-no-files-found: error

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Cosign keyless sign image digest (GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_REF}"
