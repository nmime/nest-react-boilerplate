name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Nx quality gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec nx run-many -t lint --all

      - name: Typecheck
        run: pnpm exec nx run-many -t typecheck --all

      - name: Test
        run: pnpm exec nx run-many -t test --all

      - name: Frontend static e2e
        run: pnpm exec nx run-many -t e2e --projects=admin-app,user-app,landing-app

      - name: Build
        run: pnpm exec nx run-many -t build --all
