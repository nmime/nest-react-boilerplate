name: Dependency review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
      - name: Write dependency review summary
        if: always()
        run: |
          {
            echo "## Dependency review summary"
            echo
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "The dependency-review action is configured with \`comment-summary-in-pr: always\` and \`fail-on-severity: moderate\`."
          } | tee dependency-review-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload dependency review summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: dependency-review-summary
          path: dependency-review-summary.md
          if-no-files-found: ignore
