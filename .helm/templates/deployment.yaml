{{- $root := . -}}
{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "boilerplate.fullname" $root }}-{{ kebabcase $name }}
  labels:
    {{- include "boilerplate.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ kebabcase $name }}
spec:
  {{- if not $root.Values.autoscaling.enabled }}
  replicas: {{ $app.replicas }}
  {{- end }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "boilerplate.name" $root }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app.kubernetes.io/component: {{ kebabcase $name }}
  template:
    metadata:
      labels:
        {{- include "boilerplate.labels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ kebabcase $name }}
    spec:
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ kebabcase $name }}
          image: {{ include "boilerplate.image" (dict "name" $name "image" $app.image) | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $app.image.pullPolicy }}
          {{- with $app.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ $app.port }}
          env:
            # Override the Dockerfile default PORT=3000 so each Nest API listens
            # on the same port exposed by its Kubernetes containerPort. Nginx
            # frontends ignore this variable.
            - name: PORT
              value: {{ $app.port | quote }}
          {{- if contains "Api" $name }}
          envFrom:
            - configMapRef:
                name: {{ include "boilerplate.fullname" $root }}-config
            - secretRef:
                name: {{ include "boilerplate.secretName" $root }}
          {{- end }}
          {{- if and $root.Values.frontendNginx.enabled $app.nginxConfig }}
          volumeMounts:
            - name: frontend-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: {{ default (ternary "/ready" "/" (contains "Api" $name)) $app.readinessPath | quote }}
              port: http
            initialDelaySeconds: {{ default 10 $app.readinessInitialDelaySeconds }}
            periodSeconds: {{ default 10 $app.readinessPeriodSeconds }}
            timeoutSeconds: {{ default 3 $app.readinessTimeoutSeconds }}
            failureThreshold: {{ default 6 $app.readinessFailureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ default (ternary "/live" "/" (contains "Api" $name)) $app.livenessPath | quote }}
              port: http
            initialDelaySeconds: {{ default 20 $app.livenessInitialDelaySeconds }}
            periodSeconds: {{ default 20 $app.livenessPeriodSeconds }}
            timeoutSeconds: {{ default 3 $app.livenessTimeoutSeconds }}
            failureThreshold: {{ default 3 $app.livenessFailureThreshold }}
          resources:
            {{- toYaml $app.resources | nindent 12 }}
      {{- if and $root.Values.frontendNginx.enabled $app.nginxConfig }}
      volumes:
        - name: frontend-nginx-config
          configMap:
            name: {{ include "boilerplate.fullname" $root }}-frontend-nginx
            items:
              - key: default.conf
                path: default.conf
      {{- end }}
{{- end }}
{{- end }}
