name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Nx quality gates
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm exec nx run-many -t lint --all

      - name: Typecheck
        run: pnpm exec nx run-many -t typecheck --all

      - name: Test with configured coverage gates
        run: pnpm run test:coverage

      - name: Component tests with Testcontainers
        run: pnpm run test:component -- --coverage

      - name: Build
        run: pnpm exec nx run-many -t build --all

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Storybook
        run: pnpm run storybook:build

      - name: Storybook interaction tests
        run: pnpm run test:storybook

      - name: Storybook visual regression
        run: pnpm run test:visual

      - name: Dependency audit
        run: pnpm run audit

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-quality
          path: |
            coverage/**
          if-no-files-found: ignore

  e2e:
    name: Static/browser e2e coverage
    runs-on: ubuntu-24.04
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E coverage
        run: pnpm run test:e2e:coverage

      - name: Upload e2e artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: |
            coverage/e2e/**
            playwright-report/**
            test-results/**
          if-no-files-found: ignore

  docker-smoke:
    name: Docker smoke stack
    runs-on: ubuntu-24.04
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docker smoke
        run: pnpm run test:docker-smoke

  fullstack-e2e:
    name: Fullstack Playwright e2e
    runs-on: ubuntu-24.04
    needs: docker-smoke

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Fullstack e2e
        run: pnpm run test:fullstack

      - name: Upload fullstack artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fullstack-e2e-artifacts
          path: |
            coverage/e2e/fullstack/**
            playwright-report/fullstack/**
            test-results/fullstack/**
          if-no-files-found: ignore
