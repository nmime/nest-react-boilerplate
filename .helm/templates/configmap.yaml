{{- $otelEnabled := and .Values.monitoring.enabled .Values.monitoring.otel.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "boilerplate.fullname" . }}-config
  labels:
    {{- include "boilerplate.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  AUTH_JWT_ISSUER: {{ .Values.config.authJwtIssuer | quote }}
  AUTH_JWT_AUDIENCE: {{ .Values.config.authJwtAudience | quote }}
  AUTH_JWT_EXPIRES_IN_SECONDS: {{ .Values.config.authJwtExpiresInSeconds | quote }}
  AUTH_TOKEN_CLEANUP_ENABLED: {{ .Values.config.authTokenCleanupEnabled | quote }}
  AUTH_TOKEN_CLEANUP_INTERVAL_MS: {{ .Values.config.authTokenCleanupIntervalMs | quote }}
  AUTH_TOKEN_CLEANUP_RUN_ON_START: {{ .Values.config.authTokenCleanupRunOnStart | quote }}
  OPENAPI_ENABLED: {{ .Values.config.openApiEnabled | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  RATE_LIMIT_ENABLED: {{ .Values.config.rateLimitEnabled | quote }}
  RATE_LIMIT_STORE: {{ .Values.config.rateLimitStore | quote }}
  RATE_LIMIT_WINDOW_MS: {{ .Values.config.rateLimitWindowMs | quote }}
  RATE_LIMIT_MAX: {{ .Values.config.rateLimitMax | quote }}
  REDIS_KEY_PREFIX: {{ .Values.config.redisKeyPrefix | quote }}
  {{ if .Values.config.redisUrl }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  {{ end }}
  {{ if .Values.config.redisHosts }}
  REDIS_HOSTS: {{ .Values.config.redisHosts | quote }}
  {{ end }}
  {{ if .Values.config.redisMode }}
  REDIS_MODE: {{ .Values.config.redisMode | quote }}
  {{ end }}
  {{ if .Values.config.redisDb }}
  REDIS_DB: {{ .Values.config.redisDb | quote }}
  {{ end }}
  POSTGRES_HOST: {{ .Values.postgresql.host | quote }}
  POSTGRES_PORT: {{ .Values.postgresql.port | quote }}
  POSTGRES_DB: {{ .Values.postgresql.database | quote }}
  POSTGRES_USER: {{ .Values.postgresql.user | quote }}
  POSTGRES_SSL: {{ .Values.postgresql.ssl | quote }}
  POSTGRES_SSL_REJECT_UNAUTHORIZED: {{ .Values.postgresql.sslRejectUnauthorized | quote }}
  POSTGRES_SYNCHRONIZE: 'false'
  OTEL_ENABLED: {{ ternary "true" "false" $otelEnabled | quote }}
  OTEL_SERVICE_NAME: {{ include "boilerplate.fullname" . | quote }}
  {{ if .Values.monitoring.otel.serviceVersion }}
  OTEL_SERVICE_VERSION: {{ .Values.monitoring.otel.serviceVersion | quote }}
  {{ end }}
  {{ if $otelEnabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ default (printf "http://%s-otel-collector:4318" (include "boilerplate.fullname" .)) .Values.monitoring.otel.endpoint | quote }}
  OTEL_EXPORTER_OTLP_HEADERS: {{ default "" .Values.monitoring.otel.headers | quote }}
  OTEL_METRIC_EXPORT_INTERVAL: {{ default "60000" .Values.monitoring.otel.metricExportInterval | quote }}
  {{ end }}
{{- if .Values.frontendNginx.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "boilerplate.fullname" . }}-frontend-nginx
  labels:
    {{- include "boilerplate.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend-nginx
data:
  default.conf: |
    map $http_accept $frontend_accepts_html {
      default 0;
      "~*text/html" 1;
    }

    map $request_method $frontend_is_navigation_method {
      default 0;
      GET 1;
      HEAD 1;
    }

    map "$frontend_is_navigation_method:$frontend_accepts_html" $frontend_spa_navigation {
      default 0;
      "1:1" 1;
    }

    server {
      listen {{ default 8080 .Values.frontendNginx.listenPort }};
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src {{ .Values.frontendNginx.cspConnectSrc }}; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

      location = {{ .Values.frontendNginx.healthPath }} {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
      }

      location = /index.html {
        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header Expires "Sat, 01 Jan 2000 00:00:00 GMT" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
      }

      location = /profile {
        try_files /index.html =404;
      }

      location = /app {
        try_files /index.html =404;
      }

      location = /app/ {
        try_files /index.html =404;
      }

      location = /admin {
        try_files /index.html =404;
      }

      location = /admin/ {
        try_files /index.html =404;
      }

      location = /admin/dashboard {
        try_files /index.html =404;
      }

      location = /admin/dashboard/ {
        try_files /index.html =404;
      }

      location = /admin/profile {
        try_files /index.html =404;
      }

      location = /admin/profile/ {
        try_files /index.html =404;
      }

      error_page 418 = @frontend_spa;

      location @frontend_spa {
        try_files /index.html =404;
      }

      location ^~ /auth/docs {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "boilerplate.fullname" . }}-auth-api:{{ default .Values.apps.authApi.port .Values.apps.authApi.servicePort }};
      }

      location ^~ /auth/ {
        if ($frontend_spa_navigation) {
          return 418;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "boilerplate.fullname" . }}-auth-api:{{ default .Values.apps.authApi.port .Values.apps.authApi.servicePort }};
      }

      location ^~ /profile/ {
        if ($frontend_spa_navigation) {
          return 418;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "boilerplate.fullname" . }}-user-api:{{ default .Values.apps.userApi.port .Values.apps.userApi.servicePort }};
      }

      location ^~ /admin/docs {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "boilerplate.fullname" . }}-admin-api:{{ default .Values.apps.adminApi.port .Values.apps.adminApi.servicePort }};
      }

      location ^~ /admin/ {
        if ($frontend_spa_navigation) {
          return 418;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "boilerplate.fullname" . }}-admin-api:{{ default .Values.apps.adminApi.port .Values.apps.adminApi.servicePort }};
      }

      location / {
        try_files $uri $uri/ /index.html;
      }

      location ~* \.(css|js|jpg|jpeg|gif|png|svg|ico|ttf|woff|woff2|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
      }
    }
{{- end }}
