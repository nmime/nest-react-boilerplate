{{- if .Values.secrets.existingSecret }}
{{- /* External secret supplied; do not render an in-chart Secret. */ -}}
{{- else if .Values.secrets.create }}
{{- $authJwtSecret := required "secrets.authJwtSecret is required when secrets.create=true" .Values.secrets.authJwtSecret -}}
{{- $databaseUrl := required "secrets.databaseUrl is required when secrets.create=true" .Values.secrets.databaseUrl -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "boilerplate.secretName" . }}
  labels:
    {{- include "boilerplate.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_JWT_SECRET: {{ $authJwtSecret | quote }}
  DATABASE_URL: {{ $databaseUrl | quote }}
{{- else }}
{{- fail "Set secrets.existingSecret, or set secrets.create=true with secrets.authJwtSecret and secrets.databaseUrl." }}
{{- end }}
