{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "boilerplate.secretName" . }}
  labels:
    {{- include "boilerplate.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_JWT_SECRET: replace-me-with-external-secret
  DATABASE_URL: postgres://postgres:replace-me@postgresql:5432/nest_react_boilerplate
{{- end }}
