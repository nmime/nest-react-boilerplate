name: Feature request
description: Propose a focused improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: Tests, docs, metrics, or rollout checks.
