name: Release images

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  PNPM_VERSION: 10.32.1
  HELM_VERSION: v3.15.4

jobs:
  helm-render:
    name: Helm render gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Validate Helm chart
        run: bash scripts/validate-helm.sh

  build-scan-sign:
    name: Build, scan, and sign ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: helm-render
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: migrator
            target: migrator
            build-args: |
              PNPM_VERSION=10.32.1
          - name: admin-app-api
            target: backend
            build-args: |
              NX_PROJECT=backend-admin-app-api
              BUILD_OUTPUT=dist/apps/backend/admin-app-api
              PNPM_VERSION=10.32.1
          - name: user-app-api
            target: backend
            build-args: |
              NX_PROJECT=user-app-api
              BUILD_OUTPUT=dist/apps/backend/user-app-api
              PNPM_VERSION=10.32.1
          - name: auth-app-api
            target: backend
            build-args: |
              NX_PROJECT=auth-app-api
              BUILD_OUTPUT=dist/apps/backend/auth-app-api
              PNPM_VERSION=10.32.1
          - name: admin-app
            target: frontend
            build-args: |
              NX_PROJECT=admin-app
              FRONTEND_OUTPUT=dist/apps/frontend/admin
              PNPM_VERSION=10.32.1
          - name: user-app
            target: frontend
            build-args: |
              NX_PROJECT=user-app
              FRONTEND_OUTPUT=dist/apps/frontend/app
              PNPM_VERSION=10.32.1
          - name: landing-app
            target: frontend
            build-args: |
              NX_PROJECT=landing-app
              FRONTEND_OUTPUT=dist/apps/frontend/landing
              PNPM_VERSION=10.32.1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          provenance: mode=max
          sbom: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Generate SBOM artifact
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json
          if-no-files-found: error

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign keyless sign image digest (GitHub OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_REF}"
