name: Delete R106 temporary branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  WORKFLOW_FILE: .github/workflows/delete-r106-temp-branches.yml
  TRIGGER_FILE: .github/r106-branch-cleanup.trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete temporary R106 branches
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          for branch in refactor/all-libs-lib-src-layout fix/lib-src-glob-overwrite; do
            api="https://api.github.com/repos/${REPOSITORY}/git/refs/heads/${branch}"
            status="$({ curl -sS -o /tmp/delete-ref-response.json -w "%{http_code}" \
              -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api" || true; })"
            if [ "$status" = "204" ]; then
              echo "Deleted ${branch}"
            elif [ "$status" = "404" ]; then
              echo "${branch} already absent"
            else
              echo "Failed to delete ${branch}; HTTP ${status}"
              cat /tmp/delete-ref-response.json
              exit 1
            fi
          done

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Remove one-time workflow and trigger
        run: |
          set -euo pipefail
          git rm -f "$WORKFLOW_FILE" "$TRIGGER_FILE"

      - name: Commit cleanup removal
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: remove one-time r106 branch cleanup workflow"
          git push origin HEAD:main
