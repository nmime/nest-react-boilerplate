name: Migrate all libs to lib/src layout

on:
  push:
    branches:
      - refactor/all-libs-lib-src-layout
    paths:
      - .github/workflows/migrate-all-libs-lib-src.yml
  workflow_dispatch:

permissions:
  contents: write

env:
  WORKFLOW_FILE: .github/workflows/migrate-all-libs-lib-src.yml

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Move library source roots to lib/src
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import json
          import os
          import subprocess

          repo = Path.cwd()
          project_files = sorted(repo.glob('libs/**/project.json'))
          moves: list[tuple[Path, Path, str, str]] = []

          for project_file in project_files:
              data = json.loads(project_file.read_text())
              source_root = data.get('sourceRoot')
              if not isinstance(source_root, str):
                  continue
              if not source_root.startswith('libs/') or not source_root.endswith('/src'):
                  continue
              if source_root.endswith('/lib/src'):
                  continue

              old_src = repo / source_root
              if not old_src.is_dir():
                  raise SystemExit(f'missing source root: {source_root}')
              new_source_root = source_root[:-4] + '/lib/src'
              new_src = repo / new_source_root
              if new_src.exists():
                  raise SystemExit(f'target already exists: {new_source_root}')
              moves.append((old_src, new_src, source_root, new_source_root))

          if not moves:
              raise SystemExit('no library source roots needed migration')

          for old_src, new_src, _old_root, _new_root in moves:
              new_src.parent.mkdir(parents=True, exist_ok=True)
              subprocess.run(['git', 'mv', str(old_src.relative_to(repo)), str(new_src.relative_to(repo))], check=True)

          replacements: list[tuple[str, str]] = []
          for _old_src, _new_src, old_root, new_root in moves:
              replacements.extend([
                  (old_root + '/', new_root + '/'),
                  (old_root + '"', new_root + '"'),
                  (old_root + "'", new_root + "'"),
                  (old_root + '`', new_root + '`'),
                  (old_root + ',', new_root + ','),
                  (old_root + ']', new_root + ']'),
                  (old_root + ')', new_root + ')'),
                  (old_root, new_root),
              ])

          text_suffixes = {
              '.ts', '.tsx', '.mts', '.cts', '.js', '.jsx', '.mjs', '.cjs',
              '.json', '.jsonc', '.md', '.yml', '.yaml', '.css', '.scss', '.html', '.txt'
          }
          skip_dirs = {'.git', 'node_modules', 'dist', 'coverage', '.nx'}

          def should_skip(path: Path) -> bool:
              return any(part in skip_dirs for part in path.parts)

          for path in sorted(repo.rglob('*')):
              if not path.is_file() or should_skip(path):
                  continue
              if path.suffix not in text_suffixes and path.name not in {'Dockerfile'}:
                  continue
              try:
                  original = path.read_text()
              except UnicodeDecodeError:
                  continue
              updated = original
              for old, new in replacements:
                  updated = updated.replace(old, new)
              # Project-local relative references in configs such as tsconfig/vitest/storybook.
              if 'libs' in path.parts:
                  updated = updated.replace('"src/', '"lib/src/')
                  updated = updated.replace("'src/", "'lib/src/")
                  updated = updated.replace('`src/', '`lib/src/')
                  updated = updated.replace('"./src/', '"./lib/src/')
                  updated = updated.replace("'./src/", "'./lib/src/")
                  updated = updated.replace('`./src/', '`./lib/src/')
                  updated = updated.replace('"../src/', '"../lib/src/')
                  updated = updated.replace("'../src/", "'../lib/src/")
                  updated = updated.replace('`../src/', '`../lib/src/')
                  updated = updated.replace('src/**/*.ts', 'lib/src/**/*.ts')
                  updated = updated.replace('src/**/*.tsx', 'lib/src/**/*.tsx')
                  updated = updated.replace('src/**/*.stories', 'lib/src/**/*.stories')
                  updated = updated.replace('src/**/*.spec', 'lib/src/**/*.spec')
              if updated != original:
                  path.write_text(updated)

          # Re-normalize project.json sourceRoot fields from exact move table to avoid accidental misses.
          move_map = {old: new for _old_src, _new_src, old, new in moves}
          for project_file in project_files:
              if not project_file.exists():
                  continue
              data = json.loads(project_file.read_text())
              source_root = data.get('sourceRoot')
              if source_root in move_map:
                  data['sourceRoot'] = move_map[source_root]
                  project_file.write_text(json.dumps(data, indent=2) + '\n')

          print('migrated_source_roots=')
          for _old_src, _new_src, old_root, new_root in moves:
              print(f'{old_root} -> {new_root}')
          PY

      - name: Validate lib/src layout
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import json
          import re
          repo = Path.cwd()
          bad = []
          migrated = []
          for project_file in sorted(repo.glob('libs/**/project.json')):
              data = json.loads(project_file.read_text())
              source_root = data.get('sourceRoot')
              if not isinstance(source_root, str) or not source_root.startswith('libs/'):
                  continue
              migrated.append(source_root)
              if not source_root.endswith('/lib/src'):
                  bad.append(f'{project_file}: sourceRoot={source_root}')
              if not (repo / source_root).is_dir():
                  bad.append(f'{project_file}: missing sourceRoot dir {source_root}')
          for root_src in sorted(repo.glob('libs/**/src')):
              if '/lib/src' not in root_src.as_posix():
                  bad.append(f'unmigrated root src dir: {root_src.as_posix()}')
          if bad:
              print('\n'.join(bad))
              raise SystemExit(1)
          print('validated_source_roots=')
          print('\n'.join(migrated))
          PY

      - name: Remove one-time workflow
        run: |
          set -euo pipefail
          git rm "$WORKFLOW_FILE"

      - name: Commit migration
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add -A
          git commit -m "refactor: move all library source roots to lib/src"
          git push origin HEAD:refactor/all-libs-lib-src-layout
