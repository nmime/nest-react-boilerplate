name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
      - name: Write CodeQL summary
        if: always()
        run: |
          mkdir -p ci-summaries
          {
            echo "# CodeQL summary"
            echo ""
            echo "Result: ${{ job.status }}"
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "Code scanning results are uploaded to GitHub Advanced Security when the analysis step succeeds."
          } | tee ci-summaries/codeql-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload CodeQL summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codeql-summary
          path: ci-summaries/codeql-summary.md
          if-no-files-found: error
