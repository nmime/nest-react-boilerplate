name: Cleanup admin spec branch

on:
  push:
    branches:
      - test/admin-spec-auth-rbac-fix

permissions:
  contents: write

jobs:
  delete-leftover-branch:
    name: Delete leftover admin spec branch
    if: github.repository == 'nmime/nest-react-boilerplate' && github.ref == 'refs/heads/test/admin-spec-auth-rbac-fix'
    runs-on: ubuntu-latest
    steps:
      - name: Delete this cleanup branch through GitHub REST
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_REF: heads/test/admin-spec-auth-rbac-fix
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF}" != "refs/heads/test/admin-spec-auth-rbac-fix" ]; then
            echo "Ref guard failed: ${GITHUB_REF}"
            exit 1
          fi

          status="$(curl -sS -o /tmp/delete-ref-response.json -w "%{http_code}" \
            -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/git/refs/${TARGET_REF}")"

          if [ "${status}" = "204" ]; then
            echo "Deleted refs/${TARGET_REF}."
            exit 0
          fi

          echo "DELETE /repos/${REPOSITORY}/git/refs/${TARGET_REF} returned ${status}:"
          cat /tmp/delete-ref-response.json || true
          exit 1
