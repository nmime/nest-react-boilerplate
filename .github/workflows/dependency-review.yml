name: Dependency review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
      - name: Write dependency review summary
        if: always()
        run: |
          {
            echo "## Dependency review summary"
            echo
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "The dependency-review action is configured with \`comment-summary-in-pr: always\` and \`fail-on-severity: moderate\`."
          } | tee dependency-review-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload dependency review summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dependency-review-summary
          path: dependency-review-summary.md
          if-no-files-found: ignore
