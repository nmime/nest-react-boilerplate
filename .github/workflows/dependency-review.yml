name: Dependency review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfile-audit:
    name: Supported lockfile audit
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      CI: "true"
      NODE_VERSION_FILE: .nvmrc
      PNPM_VERSION: 11.6.0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production lockfile
        run: pnpm run audit:ci

      - name: Write lockfile audit summary
        if: always()
        run: |
          {
            echo "## Dependency review summary"
            echo
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "GitHub dependency-review-action is intentionally not used because this repository does not support GitHub Dependency Graph for that action."
            echo "This workflow uses the supported lockfile fallback: \`pnpm run audit:ci\` (production dependencies, moderate severity threshold)."
          } | tee dependency-review-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload dependency review summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dependency-review-summary
          path: dependency-review-summary.md
          if-no-files-found: ignore
