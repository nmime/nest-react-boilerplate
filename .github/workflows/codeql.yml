name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@21eb7f7842f33eafc83782b56fff2a2c43e9696f # v4.36.1
        with:
          languages: javascript-typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@21eb7f7842f33eafc83782b56fff2a2c43e9696f # v4.36.1
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@21eb7f7842f33eafc83782b56fff2a2c43e9696f # v4.36.1
      - name: Write CodeQL summary
        if: always()
        run: |
          {
            echo "## CodeQL summary"
            echo
            echo "Workflow: ${{ github.workflow }}"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "See the Security tab and this workflow run for analysis details."
          } | tee codeql-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload CodeQL summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: codeql-summary
          path: codeql-summary.md
          if-no-files-found: ignore
