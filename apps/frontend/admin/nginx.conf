server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Global fallback for SPA routes: if a non-static file isn’t found,
    # internally rewrite the request to index.html.
    error_page 404 /index.html;

    # Allow only self iframe embedding
    add_header Content-Security-Policy "frame-ancestors 'self'" always;

    # Add non-cache headers when serving index.html (either directly or as a fallback)
    location = /index.html {
        # Allow only self iframe embedding
        add_header Content-Security-Policy "frame-ancestors 'self'" always;

        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header Expires "Sat, 01 Jan 2000 00:00:00 GMT" always;
        add_header Pragma "no-cache" always;
    }

    # For non-static routes, try files or fallback to /index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Named location to return a 404 for missing static assets.
    location @static404 {
        # Allow only self iframe embedding
        add_header Content-Security-Policy "frame-ancestors 'self'" always;

        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header Expires "Sat, 01 Jan 2000 00:00:00 GMT" always;
        add_header Pragma "no-cache" always;

        return 404;
    }

    # For static asset requests, if the file isn’t found, internally route to @static404.
    location ~* \.(css|js|jpg|jpeg|gif|png|svg|ico|ttf|woff|woff2|eot)$ {
        try_files $uri @static404;
    }
}
